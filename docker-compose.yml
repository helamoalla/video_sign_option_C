services:
  videosign:
    image: video-sign-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: videosign-api
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_outputs:/app/outputs
      - app_uploads:/app/uploads

  worker:
    image: video-sign-app:latest
    container_name: videosign-worker
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --concurrency=1
    env_file:
      - .env
    depends_on:
      videosign:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_outputs:/app/outputs
      - app_uploads:/app/uploads

  postgres:
    image: postgres:16-alpine
    container_name: videosign-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: videosign-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  app_outputs:
  app_uploads: