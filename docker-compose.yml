services:
  videosign:
    image: video-sign-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: videosign-api
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_outputs:/app/outputs
      - app_uploads:/app/uploads

  worker:
    image: video-sign-app:latest
    container_name: videosign-worker

    command:
      - /bin/sh
      - -c
      - |
        rm -f /tmp/.X99-lock
        Xvfb :99 -screen 0 1280x1024x24 -nolisten tcp > /tmp/xvfb.log 2>&1 &
        sleep 2
        export DISPLAY=:99
        exec celery -A app.celery_app worker --loglevel=info --concurrency=1 --hostname=videosign-worker@%h

    env_file:
      - .env

    depends_on:
      videosign:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - app_outputs:/app/outputs
      - app_uploads:/app/uploads

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.celery_app inspect ping --timeout=5 | grep -q pong"
        ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: videosign-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: videosign-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  beat:
    image: video-sign-app:latest
    container_name: videosign-beat
    command:
      - celery
      - -A
      - app.celery_app
      - beat
      - --loglevel=info
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

volumes:
  postgres_data:
  redis_data:
  app_outputs:
  app_uploads: